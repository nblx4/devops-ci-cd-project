name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install Dependencies
        run: npm install

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: .

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm test

      - name: Run ESLint
        run: npx eslint .

      - name: Run Security Audit
        run: npm audit --audit-level=high

      - name: Notify if Test Pipeline Fails
        if: failure()
        run: echo "TEST PIPELINE FAILED: Please check unit tests, ESLint issues, or dependency vulnerabilities."